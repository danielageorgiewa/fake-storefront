name: CI

# Build the monorepo on every pull request and every push to main so build
# breakage is caught before merge. The code lives in storefront/ (npm workspaces
# + Turborepo — npm, not pnpm; Node 20). This iteration is DB-less: no Postgres,
# migrations, dev servers, or Docker.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest
    defaults:
      run:
        # The Turborepo monorepo lives here; the repo root is just a wrapper.
        working-directory: storefront
    env:
      # Build-time STUBS — NOT real credentials. CI has no backend to talk to.
      # Kept ready for when a storefront build/lint step is added: its
      # check-env-variables.js (invoked from next.config.js) calls
      # process.exit(1) if this is missing, and only checks truthiness, so any
      # placeholder unblocks it. Harmless for the backend build.
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_ci_build_stub_not_a_real_key
      # Keep CI logs quiet.
      NEXT_TELEMETRY_DISABLED: "1"
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          # Single lockfile lives in storefront/, not at the repo root.
          cache-dependency-path: storefront/package-lock.json

      - name: Install dependencies
        run: npm ci

      # medusa build compiles without a database — it only reads env into config.
      - name: Build backend
        run: npm run build -- --filter=@dtc/backend

      # NOTE: the storefront is not built or linted here yet.
      #  - `next build` needs a live backend during static generation
      #    (collections/categories generateStaticParams fetch the Store API),
      #    which this DB-less iteration has no backend to serve.
      #  - `next lint` currently crashes in this repo (deprecated in Next 15,
      #    and the root ajv override breaks @eslint/eslintrc).
      # Add a storefront job in a later iteration once CI provisions a backend
      # service (and the lint tooling is untangled).
